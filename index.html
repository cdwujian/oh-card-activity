<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OH 卡抽取</title>
  <style>
    :root {
      --cream: #FFF8F0;
      --peach: #FFD6B8;
      --coral: #FF8C69;
      --mint: #B8EDD6;
      --mint-dark: #6DCBA8;
      --lavender: #D4C5F9;
      --lavender-dark: #9B85E8;
      --yellow: #FFE566;
      --brown: #6B4E3D;
      --text: #4A3728;
      --text-light: #8B7066;
      --white: #FFFFFF;
      --shadow: 0 8px 32px rgba(107,78,61,0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: var(--cream);
      background-image:
        radial-gradient(circle at 15% 25%, rgba(255,214,184,0.6) 0%, transparent 45%),
        radial-gradient(circle at 85% 75%, rgba(212,197,249,0.5) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(184,237,214,0.3) 0%, transparent 60%);
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Nunito', sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Floaties */
    .floaties { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .floaty { position: absolute; border-radius: 50%; opacity: 0.2; animation: floatUp linear infinite; }
    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); }
      100% { transform: translateY(-120px) rotate(360deg); }
    }

    /* Deco stars */
    .deco-star { position: fixed; pointer-events: none; font-size: 18px; opacity: 0.15; animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(1.2) rotate(15deg); }
    }

    /* Main card */
    .main-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      margin: 40px 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--yellow); color: var(--brown);
      border-radius: 20px; padding: 5px 16px;
      font-size: 12px; font-weight: 800; letter-spacing: 1px;
      margin-bottom: 14px;
      box-shadow: 0 3px 0 rgba(107,78,61,0.12);
    }
    .header h1 {
      font-size: 34px; font-weight: 900; color: var(--text);
      line-height: 1.2; margin-bottom: 8px; letter-spacing: -0.5px;
    }
    .header h1 span {
      background: linear-gradient(135deg, var(--coral), var(--lavender-dark));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .sub { font-size: 14px; color: var(--text-light); font-weight: 600; }

    /* Panel */
    .card-panel {
      background: var(--white);
      border-radius: 28px;
      padding: 36px 32px;
      box-shadow: var(--shadow);
      border: 2px solid #F0E8FF;
      text-align: center;
    }

    /* Initial state */
    .initial-state { padding: 8px 0; }
    .deck-visual {
      position: relative; width: 160px; height: 210px;
      margin: 0 auto 28px;
    }
    .deck-card {
      position: absolute; width: 140px; height: 195px;
      border-radius: 18px;
      box-shadow: 0 6px 20px rgba(155,133,232,0.25);
      border: 2px solid rgba(255,255,255,0.8);
    }
    .deck-card:nth-child(1) { transform: rotate(-6deg) translate(-4px, 4px); background: linear-gradient(145deg, var(--mint), var(--mint-dark)); opacity: 0.5; }
    .deck-card:nth-child(2) { transform: rotate(-2.5deg) translate(-1px, 1px); background: linear-gradient(145deg, #BDE8FF, #7DD3F8); opacity: 0.7; }
    .deck-card:nth-child(3) {
      transform: rotate(0deg);
      background: linear-gradient(145deg, var(--lavender), #C8B8F8);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px;
      animation: gentlePulse 2.5s ease-in-out infinite;
    }
    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    .initial-state p {
      font-size: 14px; color: var(--text-light); font-weight: 600;
      line-height: 1.7; margin-bottom: 28px;
    }

    /* Draw button */
    .btn-draw {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--coral), #FF6B9D);
      color: #fff; border: none; border-radius: 50px;
      padding: 15px 44px; font-size: 17px; font-weight: 800;
      cursor: pointer; letter-spacing: 0.5px;
      box-shadow: 0 6px 20px rgba(255,140,105,0.45), 0 3px 0 rgba(200,80,60,0.25);
      transition: all 0.2s ease; font-family: inherit;
    }
    .btn-draw:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(255,140,105,0.55), 0 3px 0 rgba(200,80,60,0.25); }
    .btn-draw:active { transform: translateY(0); }

    /* Loading */
    .loading-state { display: none; padding: 48px 0; }
    .loading-state.active { display: block; }
    .loader-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
    .loader-dot { width: 12px; height: 12px; border-radius: 50%; animation: dotBounce 1.2s ease-in-out infinite; }
    .loader-dot:nth-child(1) { background: var(--coral); animation-delay: 0s; }
    .loader-dot:nth-child(2) { background: var(--mint-dark); animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { background: var(--lavender-dark); animation-delay: 0.4s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.5; }
      40% { transform: scale(1.2); opacity: 1; }
    }
    .loading-state p { font-size: 14px; color: var(--text-light); font-weight: 600; }

    /* Result */
    .result-state { display: none; }
    .result-state.active { display: block; }

    .card-id-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--yellow); color: var(--brown);
      border-radius: 20px; padding: 4px 16px;
      font-size: 13px; font-weight: 800;
      margin-bottom: 20px;
      box-shadow: 0 2px 0 rgba(107,78,61,0.12);
    }

    /* Card flip */
    .card-flip-wrap { perspective: 1000px; width: 220px; height: 300px; margin: 0 auto 24px; }
    .card-flip-inner {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card-flip-inner.flipped { transform: rotateY(180deg); }
    .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; overflow: hidden; }
    .card-back {
      background: linear-gradient(145deg, var(--lavender), #C8B8F8);
      display: flex; align-items: center; justify-content: center;
      border: 3px solid rgba(255,255,255,0.7);
      box-shadow: 0 8px 32px rgba(155,133,232,0.3);
    }
    .card-back-inner { text-align: center; }
    .card-back-inner span { font-size: 52px; display: block; margin-bottom: 8px; }
    .card-back-inner p { font-size: 10px; color: rgba(107,78,61,0.5); font-weight: 800; letter-spacing: 2px; }
    .card-front {
      transform: rotateY(180deg);
      box-shadow: 0 12px 40px rgba(107,78,61,0.2);
      border: 3px solid var(--yellow);
    }
    .card-front img { width: 100%; height: 100%; object-fit: cover; }
    .card-front .card-loading {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: var(--cream); color: var(--text-light); font-size: 13px; font-weight: 600;
    }
    @keyframes cardShine {
      0% { box-shadow: 0 12px 40px rgba(107,78,61,0.2), 0 0 0 0 rgba(255,229,102,0.8); }
      70% { box-shadow: 0 12px 40px rgba(107,78,61,0.2), 0 0 0 18px rgba(255,229,102,0); }
      100% { box-shadow: 0 12px 40px rgba(107,78,61,0.2), 0 0 0 0 rgba(255,229,102,0); }
    }
    .card-front.shining { animation: cardShine 1.2s ease-out 0.8s 3; }

    .result-caption {
      font-size: 14px; color: var(--text-light); font-weight: 600;
      line-height: 1.7; margin-bottom: 24px;
    }

    /* Redraw button */
    .btn-redraw {
      display: inline-flex; align-items: center; gap: 6px;
      background: transparent; color: var(--text-light);
      border: 2px solid #E8DDD8; border-radius: 50px;
      padding: 10px 26px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease; font-family: inherit;
    }
    .btn-redraw:hover { border-color: var(--coral); color: var(--coral); background: rgba(255,140,105,0.06); }

    /* Confetti */
    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
    }
    .confetti-bit { position: fixed; top: -20px; animation: confettiFall linear forwards; z-index: 9999; }

    @media (max-width: 480px) {
      .card-panel { padding: 28px 20px; border-radius: 24px; }
      .header h1 { font-size: 28px; }
      .card-flip-wrap { width: 190px; height: 260px; }
    }
  </style>
</head>
<body>

  <div class="floaties" id="floaties"></div>
  <div class="deco-star" style="top:6%;left:4%;animation-delay:0s">✦</div>
  <div class="deco-star" style="top:12%;right:6%;animation-delay:1s">✶</div>
  <div class="deco-star" style="bottom:15%;left:5%;animation-delay:0.5s">✷</div>
  <div class="deco-star" style="bottom:8%;right:8%;animation-delay:1.8s">✦</div>

  <div class="main-wrap">

    <!-- Header -->
    <div class="header">
      <div class="header-tag">🌿 OH Cards</div>
      <h1>心灵卡片<span>抽取</span></h1>

    </div>

    <!-- Card Panel -->
    <div class="card-panel">

      <!-- Initial -->
      <div class="initial-state" id="initialState">
        <div class="deck-visual">
          <div class="deck-card"></div>
          <div class="deck-card"></div>
          <div class="deck-card">🌸</div>
        </div>
        <p>每一张都在等待与你相遇<br>点击开始，抽取你的专属卡片</p>
        <button class="btn-draw" onclick="drawCard()">✨ 开始抽卡</button>
      </div>

      <!-- Loading -->
      <div class="loading-state" id="loadingState">
        <div class="loader-dots">
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
          <div class="loader-dot"></div>
        </div>
        <p>正在为你寻找专属卡片...</p>
      </div>

      <!-- Result -->
      <div class="result-state" id="resultState">
        <div><span class="card-id-badge">🏷 <span id="cardNumber">OH-001</span></span></div>
        <div class="card-flip-wrap">
          <div class="card-flip-inner" id="cardFlipInner">
            <div class="card-face card-back">
              <div class="card-back-inner">
                <span>🌿</span>
                <p>OH CARDS</p>
              </div>
            </div>
            <div class="card-face card-front" id="cardFront">
              <div class="card-loading">加载中...</div>
            </div>
          </div>
        </div>
        <p class="result-caption">这张卡片与你此刻的心境相遇了<br>感受一下，它想说什么？</p>
        <button class="btn-redraw" onclick="redrawCard()">↺ 重新抽一张</button>
      </div>

    </div>
  </div>

  <script>
    const ohCards = Array.from({length: 85}, (_, i) => ({
      id: `OH-${String(i+1).padStart(3,'0')}`,
      url: `images/OH-${String(i+1).padStart(3,'0')}.jpg`
    }));

    // Floaties
    (function() {
      const wrap = document.getElementById('floaties');
      const colors = ['#FFD6B8','#D4C5F9','#B8EDD6','#BDE8FF','#FFE566','#FFC8D4'];
      for (let i = 0; i < 12; i++) {
        const el = document.createElement('div');
        el.className = 'floaty';
        const s = 28 + Math.random() * 55;
        el.style.cssText = `left:${Math.random()*100}%;width:${s}px;height:${s}px;background:${colors[i%colors.length]};animation-duration:${14+Math.random()*16}s;animation-delay:${Math.random()*10}s;`;
        wrap.appendChild(el);
      }
    })();

    // Confetti
    function launchConfetti() {
      const colors = ['#FFE566','#FF8C69','#6DCBA8','#C8B8F8','#FF6B9D','#7DD3F8','#FFD6B8'];
      for (let i = 0; i < 50; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-bit';
        const s = 7 + Math.random() * 9;
        el.style.cssText = `left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${colors[Math.floor(Math.random()*colors.length)]};border-radius:${Math.random()>0.5?'50%':'3px'};animation-duration:${1.8+Math.random()*1.8}s;animation-delay:${Math.random()*0.6}s;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }
    }

    // Draw
    function drawCard() {
      document.getElementById('initialState').style.display = 'none';
      document.getElementById('loadingState').classList.add('active');
      document.getElementById('resultState').classList.remove('active');
      document.getElementById('cardFlipInner').classList.remove('flipped');

      const card = ohCards[Math.floor(Math.random() * ohCards.length)];

      setTimeout(() => {
        document.getElementById('cardNumber').textContent = card.id;

        const cardFront = document.getElementById('cardFront');
        cardFront.innerHTML = '<div class="card-loading">加载中...</div>';
        cardFront.classList.remove('shining');

        const img = new Image();
        img.onload = () => {
          cardFront.innerHTML = '';
          cardFront.appendChild(img);
          Object.assign(img.style, {width:'100%', height:'100%', objectFit:'cover'});
          doFlip(cardFront);
        };
        img.onerror = () => {
          cardFront.innerHTML = `<div class="card-loading" style="flex-direction:column;gap:10px;"><span style="font-size:40px">🎴</span><span style="font-size:13px">${card.id}</span></div>`;
          doFlip(cardFront);
        };
        img.src = card.url;

        document.getElementById('loadingState').classList.remove('active');
        document.getElementById('resultState').classList.add('active');
      }, 1400);
    }

    function doFlip(cardFront) {
      setTimeout(() => {
        document.getElementById('cardFlipInner').classList.add('flipped');
        setTimeout(() => { cardFront.classList.add('shining'); launchConfetti(); }, 750);
      }, 200);
    }

    function redrawCard() {
      document.getElementById('cardFlipInner').classList.remove('flipped');
      setTimeout(() => {
        document.getElementById('resultState').classList.remove('active');
        document.getElementById('initialState').style.display = 'block';
      }, 350);
    }
  </script>
</body>
</html>
